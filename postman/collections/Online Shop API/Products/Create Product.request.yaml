$kind: http-request
name: Create Product
method: POST
url: '{{base_url}}/api/products/'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Laptop",
      "price": 999.99,
      "description": "A powerful laptop",
      "count": 10,
      "is_active": true,
      "category": 1
    }
